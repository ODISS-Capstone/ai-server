name: ai-server Deploy

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      deploy_staging:
        description: "Deploy the pushed image to the staging host"
        required: false
        default: false
        type: boolean
      image_tag:
        description: "Optional image tag override"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/odiss-server

jobs:
  build-and-push:
    name: Build and push server image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: vars
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        id: meta
        run: |
          image="${IMAGE_NAME}:${{ steps.vars.outputs.tag }}"
          docker build -t "$image" .
          docker push "$image"
          echo "image=$image" >> "$GITHUB_OUTPUT"

  staging:
    name: Deploy staging and healthcheck
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ github.ref == 'refs/heads/main' || inputs.deploy_staging }}
    environment: staging
    env:
      STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
    steps:
      - name: Deploy over SSH
        if: ${{ env.STAGING_SSH_HOST != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -eu
            docker pull "${{ needs.build-and-push.outputs.image }}"
            docker stop odiss-server || true
            docker rm odiss-server || true
            docker run -d --name odiss-server --restart unless-stopped \
              --env-file /opt/odiss/ai-server.env \
              -p 8000:8000 \
              -v odiss-data:/app/data \
              "${{ needs.build-and-push.outputs.image }}"
            for attempt in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8000/health; then
                exit 0
              fi
              sleep 2
            done
            docker logs odiss-server
            exit 1

      - name: Skip notice
        if: ${{ env.STAGING_SSH_HOST == '' }}
        run: |
          echo "STAGING_SSH_HOST is not configured; image was pushed but staging deploy was skipped."
