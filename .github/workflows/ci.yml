name: ai-server CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_gpu_image:
        description: "Build the optional vLLM/TurboQuant GPU image"
        required: false
        default: false
        type: boolean
      turboquant_wheel_url:
        description: "Optional TurboQuantWrapper wheel URL for GPU image build"
        required: false
        default: ""
        type: string
      run_turboquant_wrap:
        description: "Run Qwen/Qwen3.5-4B TurboQuant wrapping smoke on the CUDA runner"
        required: false
        default: false
        type: boolean
      turboquant_wrapper_ref:
        description: "Git ref (branch/tag/commit) of TurboQuantWrapper to check out"
        required: false
        default: "main"
        type: string

jobs:
  test:
    name: Unit and API smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Split monolithic reasoning dataset by engine contract
        run: |
          python scripts/split_reasoning_dataset.py

      - name: Enforce per-engine dataset fit gates
        run: |
          python scripts/evaluate_engine_datasets.py \
            --dataset data/fine_tuning/qwen_router_samples.jsonl \
            --task-family router \
            --strict
          python scripts/evaluate_engine_datasets.py \
            --dataset data/fine_tuning/qwen_memory_samples.jsonl \
            --task-family memory \
            --strict
          python scripts/evaluate_engine_datasets.py \
            --dataset data/fine_tuning/qwen_delivery_samples.jsonl \
            --task-family delivery \
            --strict

      - name: Report legacy reasoning runtime mismatch (non-blocking)
        run: |
          python scripts/evaluate_engine_datasets.py \
            --dataset data/fine_tuning/qwen_reasoning_samples.jsonl \
            --task-family reasoning

      - name: TurboQuant auto-wrap lifespan smoke (CPU)
        env:
          TURBOQUANT_AUTO_WRAP: "1"
          TURBOQUANT_REQUIRE_CUDA: "0"
        run: |
          python -m pip install \
            "https://github.com/${{ github.repository_owner }}/TurboQuantWrapper/archive/refs/heads/main.zip" \
            "transformers>=4.44.0" || true
          python - <<'PY'
          import importlib, logging, os
          logging.basicConfig(level=logging.INFO)
          try:
              import turboquant.runtime as _rt
          except Exception as exc:
              print("TurboQuantWrapper not installed; skipping")
              raise SystemExit(0)
          from app.services import turboquant_runtime as ai_rt
          assert ai_rt.install() in (True, False)
          import transformers as tf
          fn = tf.AutoModelForCausalLM.from_pretrained
          flag = getattr(fn, "_turboquant_wrapped", False) or getattr(
              getattr(fn, "__func__", fn), "_turboquant_wrapped", False
          )
          assert flag, "auto-wrap must patch AutoModelForCausalLM"
          print("ai-server auto-wrap hook active")
          PY

      - name: Run FastAPI health smoke
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          server_pid=$!
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8000/health; then
              kill "$server_pid"
              wait "$server_pid" || true
              exit 0
            fi
            sleep 1
          done
          kill "$server_pid" || true
          wait "$server_pid" || true
          exit 1

  docker:
    name: Build API Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build server image
        run: docker build -t odiss-server:${{ github.sha }} .

  gpu-docker:
    name: Build optional GPU runtime image
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_gpu_image }}
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build GPU server image
        run: |
          docker build \
            -f Dockerfile.gpu \
            --build-arg TURBOQUANT_WHEEL_URL="${{ inputs.turboquant_wheel_url }}" \
            -t odiss-server-gpu:${{ github.sha }} .

  turboquant-wrap:
    name: Qwen/Qwen3.5-4B TurboQuant wrapping smoke
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_turboquant_wrap }}
    runs-on: [self-hosted, linux, x64, nvidia, cuda]
    needs: test
    env:
      HF_HUB_DISABLE_TELEMETRY: "1"
      TRANSFORMERS_VERBOSITY: "error"
    steps:
      - name: Check out ai-server
        uses: actions/checkout@v4

      - name: Check out TurboQuantWrapper
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/TurboQuantWrapper
          ref: ${{ inputs.turboquant_wrapper_ref }}
          path: TurboQuantWrapper
          token: ${{ secrets.TURBOQUANT_REPO_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install \
            "transformers>=4.44.0" \
            "accelerate>=0.30.0" \
            "sentencepiece"
          python -m pip install -e ./TurboQuantWrapper

      - name: Run Qwen/Qwen3.5-4B wrapping smoke
        env:
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HUGGING_FACE_HUB_TOKEN }}
        run: |
          python TurboQuantWrapper/scripts/test_turboquant_wrapping.py \
            --targets qwen3.5-4b \
            --report turboquant-wrap-qwen35-4b.json

      - name: Upload wrapping report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-server-turboquant-wrap-report
          path: turboquant-wrap-qwen35-4b.json
